<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MWCinema</title>
    <script>
      // GitHub Pages SPA redirect: rewrite unknown paths to the index with the
      // original path preserved in the query string so the SPA can restore it.
      (function () {
        var segmentCount = 1; // project-page segment: /MWCinema/
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + segmentCount)
              .join('/') +
            '/?p=/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
